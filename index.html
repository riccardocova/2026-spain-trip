<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spain Trip 2026</title>
    <style>
        :root {
            --text-color: #222222;
            --link-color: #222222;
            --hover-color: #717171;
            --bg-color: #f8f6f0;
            --card-bg: #ffffff;
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            background-image: 
                linear-gradient(#e5e1d8 1px, transparent 1px), 
                linear-gradient(90deg, #e5e1d8 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--text-color);
            font-family: var(--font-family);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            max-width: 600px;
            width: 90%;
            padding: 3rem;
            background-color: var(--card-bg);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
            border: 1px solid rgba(0,0,0,0.02);
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 2.5rem;
            letter-spacing: -0.02em;
        }

        .links-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .links-list li {
            position: relative;
        }

        .links-list a {
            text-decoration: none;
            color: var(--link-color);
            font-size: 1.25rem;
            font-weight: 500;
            transition: color 0.2s ease;
            display: inline-block;
        }

        .links-list a::after {
            content: '';
            position: absolute;
            width: 100%;
            transform: scaleX(0);
            height: 1px;
            bottom: -2px;
            left: 0;
            background-color: var(--text-color);
            transform-origin: bottom right;
            transition: transform 0.25s ease-out;
        }

        .links-list a:hover {
            color: var(--hover-color);
        }

        .links-list a:hover::after {
            transform: scaleX(1);
            transform-origin: bottom left;
            background-color: var(--hover-color);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Spain Trip 2026</h1>
        <ul class="links-list">
            <li><a href="siviglia_quartieri.html">Siviglia - quartieri per alloggio</a></li>
            <li><a href="andalusia_map_v4.html">Malaga-Siviglia itinerary</a></li>
            <li><a href="andalusia_map_v5.html">Siviglia-Tarifa itinerary</a></li>
            <li><a href="andalusia_map_v6.html">Siviglia-Tarifa itinerary with trip to Tangeri</a></li>
        </ul>
    </div>
</body>
</html>
